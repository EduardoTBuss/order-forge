[[repos]]
repo = "local"

[[repos.hooks]]
id = "biome"
name = "biome (formatting and linting)"
language = "system"
entry = "pnpm lint --fix"
pass_filenames = false
always_run = true
types = ["javascript", "ts", "tsx"]

[[repos.hooks]]
id = "typecheck"
name = "tsc (type checking)"
language = "system"
entry = "pnpm typecheck"
pass_filenames = false
always_run = true
types = ["javascript", "ts", "tsx"]

# next build is intentionally skipped in pre-commit (slow, ~30-60s).
# Lint + typecheck catch most issues; run `pnpm build` manually or let CI
# handle the full build before merge.
